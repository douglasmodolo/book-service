name: Microservices Continuous Deployment with Github Actions

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'

    - name: Build Book Microservice JAR
      run: mvn clean package

    - name: Build Book Microservice Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/book-service:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/book-service:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/book-service:latest

    - name: Push Book Microservice Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/book-service:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/book-service:latest    
